#zoomCanvas{position:absolute;left:0;top:0;width:auto;height:auto;max-width:none;border-radius:0;background:#fff;box-shadow:0 18px 48px rgba(0,0,0,.42);will-change:transform}
.zoomControls label{font-size:14px;color:#bcd1ea}
.zoomRange{flex:1;max-width:520px;appearance:none;height:12px;border-radius:999px;background:linear-gradient(90deg,#5f9cff,#eaf3ff)}
.zoomRange::-webkit-slider-thumb{appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid #1769ff;box-shadow:0 4px 14px rgba(0,0,0,.32)}
.zoomRange::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:4px solid #1769ff;box-shadow:0 4px 14px rgba(0,0,0,.32)}
.zoomValue{min-width:52px;text-align:right;color:#eef6ff}

}

  .grid{grid-template-columns:1fr;gap:20px}

  .colorPicker{padding:14px;border-radius:20px}
  .colorSV{block-size:118px}
  .sliderLine{grid-template-columns:34px 1fr;gap:8px}

  .swatches{grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}

  .actions{gap:12px}

/* Cross-browser normalized upload controls: Chrome and Safari render the same custom UI. */
.nativeFileInput{position:absolute;inline-size:1px;block-size:1px;opacity:0;overflow:hidden;clip:rect(0 0 0 0);clip-path:inset(50%);white-space:nowrap}
.fileControl{display:grid;grid-template-columns:minmax(112px,auto) minmax(0,1fr);align-items:center;gap:14px;width:100%;min-height:64px;padding:10px 18px 10px 10px;border-radius:999px;color:#f5f5f7;background:rgba(28,28,30,.66);border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.09),0 12px 30px rgba(0,0,0,.24);cursor:pointer;user-select:none;-webkit-user-select:none;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.fileControl:hover{border-color:rgba(255,255,255,.22);box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 16px 34px rgba(0,0,0,.28)}
.fileButton{display:inline-grid;place-items:center;min-height:44px;padding:0 22px;border-radius:999px;background:linear-gradient(180deg,rgba(10,132,255,.98),rgba(0,99,214,.94));color:#fff;font-weight:900;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 12px 28px rgba(10,132,255,.24);white-space:nowrap}
.fileName{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#f5f5f7;font-weight:850}
.tempFileControl{margin-bottom:4px}
.fileControl.isFocused{outline:3px solid rgba(10,132,255,.34);outline-offset:3px}
@media(max-width:520px){
  .fileControl{grid-template-columns:1fr;border-radius:24px;padding:10px;gap:10px}
  .fileButton{width:100%}
  .fileName{text-align:center}
}
.editorShell{position:relative;margin-top:12px;border-radius:18px;background:rgba(28,28,30,.66);border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.09),0 12px 30px rgba(0,0,0,.24);overflow:hidden;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
.editorShell .editBox{display:block;width:100%;height:132px;min-height:132px;margin:0;padding:12px 28px 12px 12px;border:0;border-radius:0;background:transparent;box-shadow:none;resize:none;overflow:auto;color:#f5f5f7;scrollbar-width:none;-ms-overflow-style:none;outline:0}
.editorShell .editBox::-webkit-scrollbar{width:0;height:0;display:none}
.editorShell:focus-within{outline:3px solid rgba(10,132,255,.34);outline-offset:3px}
.customScrollbar{position:absolute;top:10px;right:8px;bottom:10px;width:8px;border-radius:999px;background:rgba(255,255,255,.08);box-shadow:inset 0 1px 0 rgba(255,255,255,.07);opacity:0;transition:opacity .18s ease;pointer-events:none}
.editorShell:hover .customScrollbar,.editorShell:focus-within .customScrollbar,.customScrollbar.isVisible{opacity:1}
.customScrollbar.isNeeded{pointer-events:auto}
.customScrollbarThumb{position:absolute;left:1px;top:0;width:6px;min-height:28px;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,.86),rgba(190,209,234,.72));box-shadow:0 2px 8px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.56);cursor:grab;touch-action:none}

<body>
<main>
<section class="hero"><h1>門市清單自動生成器</h1></section>
<section class="grid">
  <div class="card">
    <h2>上傳Google Sheet匯出的 CSV / HTML 檔</h2>
    <label class="fileControl" for="fileInput">
      <span class="fileButton">選擇檔案</span>
      <span id="fileName" class="fileName">未選擇任何檔案</span>
    </label>
    <input id="fileInput" class="nativeFileInput" type="file" accept=".html,.htm,.csv,.tsv,.txt,text/html,text/csv,text/tab-separated-values,text/plain">
    <label class="inputCaption" for="tempFileInput">上傳暫存檔</label>
    <label class="fileControl tempFileControl" for="tempFileInput">
      <span class="fileButton">選擇暫存檔</span>
      <span id="tempFileName" class="fileName">未選擇任何檔案</span>
    </label>
    <input id="tempFileInput" class="nativeFileInput" type="file" accept=".js,application/javascript,text/javascript">

    <div class="colorPicker" aria-label="背景顏色選擇器">
      <div class="colorTitle"><span>背景顏色</span><span id="colorPreview" class="colorPreview"></span></div>
      <input id="backgroundColor" type="color" value="#F4D546" hidden>
      <div id="colorSV" class="colorSV"><span id="colorHandle" class="colorHandle"></span></div>
      <div class="colorRows">
        <div class="sliderLine"><span class="sliderLabel">色相</span><input id="hueSlider" class="colorRange" type="range" min="0" max="360" value="50"></div>
        <div class="sliderLine"><span class="sliderLabel">透明</span><span class="alphaWrap"><input id="alphaSlider" class="colorRange" type="range" min="0" max="100" value="100"></span></div>
      </div>
      <div class="colorFields">
        <div class="field"><label>十六進位</label><input id="backgroundHex" value="#F4D546" maxlength="7" spellcheck="false"></div>
        <div class="field"><label>紅</label><input id="colorR" type="number" min="0" max="255" value="244"></div>
        <div class="field"><label>綠</label><input id="colorG" type="number" min="0" max="255" value="213"></div>
        <div class="field"><label>藍</label><input id="colorB" type="number" min="0" max="255" value="70"></div>
        <div class="field"><label>A</label><input id="colorA" type="number" min="0" max="100" value="100"></div>
      </div>
      <div class="swatches">
        <button class="swatch" type="button" data-color="#EE4D2D" style="background:#EE4D2D" title="Shopee Orange #EE4D2D">Shopee Orange</button>
        <button class="swatch" type="button" data-color="#D0011B" style="background:#D0011B" title="Shopee Red #D0011B">Shopee Red</button>
        <button class="swatch" type="button" data-color="#113366" style="background:#113366" title="Shopee Navy Blue #113366">Shopee Navy Blue</button>
        <button class="swatch" type="button" data-color="#0053DE" style="background:#0053DE" title="Bright Blue #0053DE">Bright Blue</button>
        <button class="swatch" type="button" data-color="#2673DD" style="background:#2673DD" title="Light Blue #2673DD">Light Blue</button>
        <button class="swatch" type="button" data-color="#26AA99" style="background:#26AA99" title="Cyan #26AA99">Cyan</button>
        <button class="swatch" type="button" data-color="#FFBB00" style="background:#FFBB00" title="Yellow #FFBB00">Yellow</button>
      </div>
    </div>

    <div class="actions">
      <button id="downloadAllBtn" type="button" disabled>下載全部圖檔&暫存檔</button>
      <button id="downloadTempBtn" type="button" disabled>下載暫存檔</button>
      <button id="clearBtn" class="danger" type="button">清除本機暫存</button>
    </div>
    <div id="status" class="status">尚未載入資料。</div>
  </div>
  <div class="card">
    <h2>預覽與單頁修改</h2>
    <div id="previewGrid" class="previewGrid"><div class="empty">上傳資料後會在這產生預覽</div></div>
  </div>
</section>
</main>
<div id="zoomModal" class="modalOverlay" aria-hidden="true">
  <div class="zoomDialog" role="dialog" aria-modal="true" aria-labelledby="zoomTitle">
    <div class="zoomHeader">
      <h3 id="zoomTitle">放大預覽</h3>
      <button id="zoomCloseBtn" class="zoomClose" type="button" aria-label="關閉">×</button>
    </div>
    <div id="zoomViewport" class="zoomViewport">
      <canvas id="zoomCanvas" width="1080" height="1920"></canvas>
    </div>
    <div class="zoomControls">
      <label for="zoomRange">縮放</label>
      <input id="zoomRange" class="zoomRange" type="range" min="30" max="220" value="70">
      <span id="zoomValue" class="zoomValue">70%</span>
    </div>
  </div>
</div>

async function loadFonts(){try{if(document.fonts&&document.fonts.load){await Promise.all([document.fonts.load('21px ShopeeContentRegular'),document.fonts.load('21px ShopeeContentMedium')]);await document.fonts.ready;}}catch(err){console.warn('Shopee fonts failed, fallback fonts will be used.',err);}}
function getFont(size,family){return size+'px '+family;}
// 只有英文字母、數字與空格用 Medium；中文、連字號與其他符號都用 Regular。
function shouldUseMediumFont(char){return /[A-Za-z0-9 ]/.test(char);}
async function init(){initBackgroundControls();initZoomModal();await loadFonts();const input=$('fileInput');const tempInput=$('tempFileInput');initUploadControlFocus(input);initUploadControlFocus(tempInput);input.addEventListener('change',()=>processSelectedFile('change'));input.addEventListener('input',()=>processSelectedFile('input'));if(tempInput){tempInput.addEventListener('change',handleTempFileUpload);tempInput.addEventListener('input',handleTempFileUpload);}$('downloadAllBtn').addEventListener('click',downloadAllCanvases);$('downloadTempBtn').addEventListener('click',downloadTempFile);$('clearBtn').addEventListener('click',clearAll);setInterval(()=>{if(input.files&&input.files[0])processSelectedFile('poll');},700);} 
function initUploadControlFocus(input){
  if(!input)return;
  const control=document.querySelector('label[for="'+input.id+'"]');
  if(!control)return;
  input.addEventListener('focus',()=>control.classList.add('isFocused'));
  input.addEventListener('blur',()=>control.classList.remove('isFocused'));
}
function setUploadFileName(targetId,file){
  const target=$(targetId);
  if(target)target.textContent=file&&file.name?file.name:'未選擇任何檔案';
}
function processSelectedFile(source){const input=$('fileInput');const file=input.files&&input.files[0];if(!file)return;const key=file.name+'|'+file.size+'|'+file.lastModified;if(key===processingKey)return;processingKey=key;handleFile(file,input,source);} 
function handleFile(file,input,source){setUploadFileName('fileName',file);const kind=detectSourceKind(file);if(!kind){setStatus('檔案格式不正確，請選擇 .html、.csv、.tsv 或 .txt。');input.value='';setUploadFileName('fileName',null);processingKey='';return;}setStatus('正在讀取 '+file.name+' ...');const reader=new FileReader();reader.onload=()=>{try{setStatus('正在解析 C 欄資料 ...');const source=String(reader.result||'');const stores=kind==='html'?parseStoresFromHtmlTable(source):parseStoresFromDelimitedText(source,kind);if(!stores.length){setStatus('檔案已讀取，但沒有解析到 C2 之後的門市資料。請確認 C 欄格式。');processingKey='';return;}setStatus('已讀取 '+stores.length+' 筆，正在生成預覽 ...');renderPages(stores);setStatus('已成功讀取 '+file.name+'，共 '+stores.length+' 筆門市，並自動生成圖片。');}catch(err){console.error(err);setStatus('解析失敗：'+err.message);processingKey='';}};reader.onerror=()=>{setStatus('檔案讀取失敗，請重新選擇檔案。');processingKey='';};reader.readAsText(file,'utf-8');}
function detectSourceKind(file){const name=String(file.name||'');const type=String(file.type||'');if(/\.html?$/i.test(name)||type==='text/html')return 'html';if(/\.csv$/i.test(name)||type==='text/csv')return 'csv';if(/\.tsv$/i.test(name)||type==='text/tab-separated-values')return 'tsv';if(/\.txt$/i.test(name)||type==='text/plain')return 'csv';if(type==='')return /\.html?$/i.test(name)?'html':(/\.(csv|txt)$/i.test(name)?'csv':(/\.tsv$/i.test(name)?'tsv':null));return null;}
function parseStoresFromHtmlTable(htmlString){const doc=new DOMParser().parseFromString(htmlString,'text/html');const rows=Array.from(doc.querySelectorAll('tr'));const stores=[];rows.forEach((row,rowIndex)=>{if(rowIndex===0)return;const cells=Array.from(row.querySelectorAll('td'));const cCell=cells[2];if(!cCell)return;const parsed=normalizeStoreText(cCell.textContent);if(parsed)stores.push(parsed);});return stores;}
function parseStoresFromDelimitedText(text,kind){const delimiter=kind==='tsv'?'\t':',';const rows=parseDelimitedRows(String(text||''),delimiter);const stores=[];rows.forEach((row,rowIndex)=>{if(rowIndex===0)return;const cCell=row[2]||'';const parsed=normalizeStoreText(cCell)||normalizeStoreText(row.slice(2).join(delimiter));if(parsed)stores.push(parsed);});return stores;}
function parseDelimitedRows(text,delimiter){const rows=[];let row=[];let cell='';let inQuotes=false;for(let i=0;i<text.length;i++){const char=text[i];const next=text[i+1];if(char==='"'){if(inQuotes&&next==='"'){cell+='"';i++;}else{inQuotes=!inQuotes;}continue;}if(char===delimiter&&!inQuotes){row.push(cell);cell='';continue;}if((char==='\n'||char==='\r')&&!inQuotes){if(char==='\r'&&next==='\n')i++;row.push(cell);if(row.length>1||row[0]!=='' )rows.push(row);row=[];cell='';continue;}cell+=char;}row.push(cell);if(row.length>1||row[0]!=='' )rows.push(row);return rows;}
function normalizeStoreText(value){let raw=String(value||'').trim();if(!raw)return null;raw=raw.replace(/^\uFEFF/,'').trim();while((raw.startsWith('"')&&raw.endsWith('"'))||(raw.startsWith("'")&&raw.endsWith("'"))){raw=raw.slice(1,-1).trim();}raw=raw.replace(/,+$/,'').trim();while((raw.startsWith('"')&&raw.endsWith('"'))||(raw.startsWith("'")&&raw.endsWith("'"))){raw=raw.slice(1,-1).trim();}const pair=raw.match(/^['"]?(\d{4})['"]?\s*:\s*['"]?(.+?)['"]?$/);if(pair)return{number:pair[1],name:pair[2].replace(/,+$/,'').trim()};const plain=raw.match(/^(\d{4})\s+(.+)$/);if(plain)return{number:plain[1],name:plain[2].replace(/,+$/,'').trim()};return null;}
function paginateStores(stores){const pages=[];for(let i=0;i<stores.length;i+=CONFIG.storesPerPage){pages.push(stores.slice(i,i+CONFIG.storesPerPage));}return pages;}
function renderPages(stores){renderPageCollection(paginateStores(stores));}
function renderPageCollection(pages){currentPages=pages;renderedCanvases=[];activeZoomCanvas=null;const grid=$('previewGrid');grid.innerHTML='';currentPages.forEach((pageStores,pageIndex)=>{const card=document.createElement('div');card.className='pageCard';const header=document.createElement('div');header.className='pageHeader';header.innerHTML='<span>第 '+(pageIndex+1)+' 張</span><span>'+pageStores.length+' 筆</span>';const canvas=document.createElement('canvas');canvas.width=CONFIG.width;canvas.height=CONFIG.height;const editorShell=document.createElement('div');editorShell.className='editorShell';const editBox=document.createElement('textarea');editBox.className='editBox';editBox.value=pageStores.map(storeToLine).join('\n');const scrollbar=document.createElement('div');scrollbar.className='customScrollbar';const thumb=document.createElement('div');thumb.className='customScrollbarThumb';scrollbar.appendChild(thumb);editorShell.appendChild(editBox);editorShell.appendChild(scrollbar);initCustomEditorScroll(editorShell,editBox,scrollbar,thumb);editBox.addEventListener('input',()=>{const edited=parseEditableLines(editBox.value);currentPages[pageIndex]=edited;drawPage(canvas,edited);updateTempDownloadState();if(activeZoomCanvas===canvas)syncZoomCanvas(canvas);updateCustomEditorScroll(editBox,scrollbar,thumb);});const actions=document.createElement('div');actions.className='pageActions';const downloadBtn=document.createElement('button');downloadBtn.type='button';downloadBtn.className='downloadOne';downloadBtn.textContent='下載這張 JPG';downloadBtn.addEventListener('click',()=>downloadCanvas(canvas,'store-list-'+pad(pageIndex+1,2)+'.jpg'));const zoomBtn=document.createElement('button');zoomBtn.type='button';zoomBtn.className='zoomOne';zoomBtn.textContent='放大預覽';zoomBtn.addEventListener('click',()=>openZoomModal(canvas,pageIndex));actions.appendChild(downloadBtn);actions.appendChild(zoomBtn);card.appendChild(header);card.appendChild(canvas);card.appendChild(editorShell);card.appendChild(actions);grid.appendChild(card);requestAnimationFrame(()=>updateCustomEditorScroll(editBox,scrollbar,thumb));drawPage(canvas,pageStores);renderedCanvases.push(canvas);});$('downloadAllBtn').disabled=renderedCanvases.length===0;updateTempDownloadState();}
function initCustomEditorScroll(shell,textarea,track,thumb){let dragStartY=0;let dragStartScroll=0;const sync=()=>updateCustomEditorScroll(textarea,track,thumb);textarea.addEventListener('scroll',sync,{passive:true});textarea.addEventListener('input',sync);window.addEventListener('resize',sync,{passive:true});thumb.addEventListener('pointerdown',event=>{if(!track.classList.contains('isNeeded'))return;event.preventDefault();dragStartY=event.clientY;dragStartScroll=textarea.scrollTop;thumb.classList.add('isDragging');track.classList.add('isVisible');thumb.setPointerCapture(event.pointerId);});thumb.addEventListener('pointermove',event=>{if(!thumb.classList.contains('isDragging'))return;const maxScroll=Math.max(1,textarea.scrollHeight-textarea.clientHeight);const maxThumbTop=Math.max(1,track.clientHeight-thumb.offsetHeight);textarea.scrollTop=dragStartScroll+((event.clientY-dragStartY)/maxThumbTop)*maxScroll;});thumb.addEventListener('pointerup',event=>{thumb.classList.remove('isDragging');track.classList.remove('isVisible');try{thumb.releasePointerCapture(event.pointerId);}catch(error){}});thumb.addEventListener('pointercancel',()=>{thumb.classList.remove('isDragging');track.classList.remove('isVisible');});track.addEventListener('pointerdown',event=>{if(event.target!==track||!track.classList.contains('isNeeded'))return;const rect=track.getBoundingClientRect();const thumbMid=thumb.offsetHeight/2;const maxScroll=Math.max(1,textarea.scrollHeight-textarea.clientHeight);const maxThumbTop=Math.max(1,track.clientHeight-thumb.offsetHeight);textarea.scrollTop=((event.clientY-rect.top-thumbMid)/maxThumbTop)*maxScroll;});requestAnimationFrame(sync);}
function updateCustomEditorScroll(textarea,track,thumb){const scrollHeight=textarea.scrollHeight;const clientHeight=textarea.clientHeight;const trackHeight=track.clientHeight;if(!trackHeight||scrollHeight<=clientHeight+1){track.classList.remove('isNeeded','isVisible');thumb.style.height='100%';thumb.style.transform='translateY(0)';return;}track.classList.add('isNeeded');const thumbHeight=Math.max(28,Math.round((clientHeight/scrollHeight)*trackHeight));const maxThumbTop=Math.max(1,trackHeight-thumbHeight);const maxScroll=Math.max(1,scrollHeight-clientHeight);const thumbTop=Math.round((textarea.scrollTop/maxScroll)*maxThumbTop);thumb.style.height=thumbHeight+'px';thumb.style.transform='translateY('+thumbTop+'px)';}
function storeToLine(store){return store.number+' '+store.name;}
function parseEditableLines(text){return String(text||'').split(/\r?\n/).map(line=>line.trim()).filter(Boolean).map(line=>{const match=line.match(/^(\d{4})\s+(.+)$/);return match?{number:match[1],name:match[2].trim()}:null;}).filter(Boolean).slice(0,CONFIG.storesPerPage);}
function drawPage(canvas,pageStores){const ctx=canvas.getContext('2d');ctx.clearRect(0,0,CONFIG.width,CONFIG.height);fillSelectedBackground(ctx);if(backgroundImage.complete&&backgroundImage.naturalWidth>0){ctx.drawImage(backgroundImage,0,0,CONFIG.width,CONFIG.height);drawStoreTexts(ctx,pageStores);}else{backgroundImage.onload=()=>{fillSelectedBackground(ctx);ctx.drawImage(backgroundImage,0,0,CONFIG.width,CONFIG.height);drawStoreTexts(ctx,pageStores);};backgroundImage.onerror=()=>drawStoreTexts(ctx,pageStores);}}
const colorState={h:50,s:71,v:96,a:100,r:244,g:213,b:70};
function fillSelectedBackground(ctx){
  // JPEG 不支援透明背景；若 A < 100，先鋪白再疊選定顏色，確保 Windows / iOS 顯示一致。
  ctx.fillStyle='#FFFFFF';
  ctx.fillRect(0,0,CONFIG.width,CONFIG.height);
  ctx.fillStyle=`rgba(${colorState.r},${colorState.g},${colorState.b},${colorState.a/100})`;
  ctx.fillRect(0,0,CONFIG.width,CONFIG.height);
}
function getBackgroundColor(){return rgbToHex(colorState.r,colorState.g,colorState.b);}
function setBackgroundColor(color){
  if(!/^#[0-9A-Fa-f]{6}$/.test(color))return;
  const rgb=hexToRgb(color);
  const hsv=rgbToHsv(rgb.r,rgb.g,rgb.b);
  Object.assign(colorState,rgb,hsv,{a:colorState.a});
  syncColorUI();
  redrawAllPages();
}
function redrawAllPages(){renderedCanvases.forEach((canvas,index)=>drawPage(canvas,currentPages[index]||[]));if(activeZoomCanvas)syncZoomCanvas(activeZoomCanvas);}
function drawStoreTexts(ctx,pageStores){ctx.textBaseline='middle';ctx.fillStyle=CONFIG.textColor;pageStores.forEach((store,index)=>{const column=Math.floor(index/CONFIG.storesPerColumn);const row=index%CONFIG.storesPerColumn;if(column>=CONFIG.columnsPerPage)return;const x=CONFIG.columnX[column];const y=CONFIG.contentTop+CONFIG.rowHeight*row;ctx.font=getFont(CONFIG.fontSize,CONFIG.fontMedium);ctx.fillText(store.number,x,y);drawMixedFittedText(ctx,store.name,x+CONFIG.numberNameGap,y,CONFIG.maxNameWidth);});}
function measureMixedText(ctx,text,size){let width=0;for(const char of String(text||'')){ctx.font=getFont(size,shouldUseMediumFont(char)?CONFIG.fontMedium:CONFIG.fontRegular);width+=ctx.measureText(char).width;}return width;}
function drawMixedText(ctx,text,x,y,size){let currentX=x;for(const char of String(text||'')){ctx.font=getFont(size,shouldUseMediumFont(char)?CONFIG.fontMedium:CONFIG.fontRegular);ctx.fillText(char,currentX,y);currentX+=ctx.measureText(char).width;}}
function drawMixedFittedText(ctx,text,x,y,maxWidth){let size=CONFIG.fontSize;while(size>CONFIG.minFontSize){if(measureMixedText(ctx,text,size)<=maxWidth)break;size-=1;}drawMixedText(ctx,text,x,y,size);} 

async function downloadAllCanvases(){
  if(!renderedCanvases.length){alert('沒有可下載圖片');return;}
  const btn=$('downloadAllBtn');
  const originalText=btn.textContent;
  btn.disabled=true;
  btn.textContent='正在整理全部 JPG…';
  try{
    const files=[];
    for(let index=0;index<renderedCanvases.length;index++){
      const canvas=renderedCanvases[index];
      // 用 toBlob 產生 JPG，避免 toDataURL 在大量頁面時吃爆記憶體。
      const blob=await canvasToBlob(canvas,'image/jpeg',0.95);
      files.push({name:'store-list-'+pad(index+1,3)+'.jpg',blob});
    }
    files.push({name:'store-list-temp.js',blob:createTempFileBlob()});
    // 不使用第三方套件，產生 Store ZIP。檔名只用 ASCII，Windows / iOS / macOS 相容性最高。
    const zipBlob=await createZipBlob(files);
    const date=new Date().toISOString().slice(0,10).replace(/-/g,'');
    triggerBlobDownload(zipBlob,'store-list-'+date+'.zip');
  }catch(error){
    console.error(error);
    alert('全部 JPG 下載失敗，請重新整理後再試一次。');
  }finally{
    btn.textContent=originalText;
    btn.disabled=false;
  }
}
function buildTempPayload(){
  return {
    app:'store-list-generator',
    version:TEMP_FILE_VERSION,
    savedAt:new Date().toISOString(),
    config:{storesPerColumn:CONFIG.storesPerColumn,columnsPerPage:CONFIG.columnsPerPage,width:CONFIG.width,height:CONFIG.height},
    color:{h:colorState.h,s:colorState.s,v:colorState.v,a:colorState.a,r:colorState.r,g:colorState.g,b:colorState.b},
    pages:currentPages.map(page=>page.map(store=>({number:String(store.number||''),name:String(store.name||'')})))
  };
}
function createTempFileBlob(){
  const payload=buildTempPayload();
  // 暫存檔是 JS，但資料主體用 JSON.stringify 輸出，避免中文、換行或引號破壞格式。
  const js='window.'+TEMP_FILE_GLOBAL+' = '+JSON.stringify(payload,null,2)+';\n';
  return new Blob([js],{type:'application/javascript;charset=utf-8'});
}
function downloadTempFile(){
  if(!currentPages.length){alert('目前沒有可下載的暫存資料');return;}
  const date=new Date().toISOString().slice(0,10).replace(/-/g,'');
  triggerBlobDownload(createTempFileBlob(),'store-list-temp-'+date+'.js');
}
function updateTempDownloadState(){
  const btn=$('downloadTempBtn');
  if(btn)btn.disabled=currentPages.length===0;
}
function handleTempFileUpload(){
  const input=$('tempFileInput');
  const file=input&&input.files&&input.files[0];
  if(!file)return;
  setUploadFileName('tempFileName',file);
  const isJs=/\.js$/i.test(file.name)||/javascript/i.test(file.type)||file.type==='';
  if(!isJs){setStatus('暫存檔格式不正確，請上傳 .js 檔。');input.value='';setUploadFileName('tempFileName',null);return;}
  const reader=new FileReader();
  setStatus('正在讀取暫存檔 '+file.name+' ...');
  reader.onload=()=>{
    try{
      const payload=parseTempPayload(String(reader.result||''));
      restoreTempPayload(payload);
      setStatus('已還原暫存檔 '+file.name+'，共 '+currentPages.reduce((sum,page)=>sum+page.length,0)+' 筆門市。');
    }catch(err){
      console.error(err);
      setStatus('暫存檔解析失敗：'+err.message);
    }finally{
      input.value='';
      setUploadFileName('tempFileName',null);
    }
  };
  reader.onerror=()=>{setStatus('暫存檔讀取失敗，請重新選擇。');input.value='';setUploadFileName('tempFileName',null);};
  reader.readAsText(file,'utf-8');
}
function parseTempPayload(jsText){
  // 僅接受本工具輸出的 window.STORE_LIST_TEMP_DATA = {...}; 格式，不執行上傳檔案中的 JS。
  const match=String(jsText||'').match(/(?:window\.)?STORE_LIST_TEMP_DATA\s*=\s*({[\s\S]*?})\s*;?\s*$/);
  if(!match)throw new Error('找不到 STORE_LIST_TEMP_DATA。');
  const payload=JSON.parse(match[1]);
  if(!payload||payload.app!=='store-list-generator'||!Array.isArray(payload.pages))throw new Error('暫存檔內容不是此工具的格式。');
  return payload;
}
function restoreTempPayload(payload){
  const pages=payload.pages.map(page=>Array.isArray(page)?page.map(store=>({number:String(store.number||'').padStart(4,'0').slice(-4),name:String(store.name||'').trim()})).filter(store=>/^\d{4}$/.test(store.number)&&store.name):[]).filter(page=>page.length);
  if(!pages.length)throw new Error('暫存檔內沒有可還原的門市資料。');
  if(payload.color&&Number.isFinite(Number(payload.color.r))&&Number.isFinite(Number(payload.color.g))&&Number.isFinite(Number(payload.color.b))){
    const restoredColor={r:clamp(Number(payload.color.r),0,255),g:clamp(Number(payload.color.g),0,255),b:clamp(Number(payload.color.b),0,255),a:Number.isFinite(Number(payload.color.a))?clamp(Number(payload.color.a),0,100):100};
    Object.assign(colorState,restoredColor,rgbToHsv(restoredColor.r,restoredColor.g,restoredColor.b));
    syncColorUI();
  }
  renderPageCollection(pages);
}
function canvasToBlob(canvas,type,quality){
  return new Promise((resolve,reject)=>{
    canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('canvas.toBlob failed')),type,quality);
  });
}
function triggerBlobDownload(blob,filename){
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download=filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function dosDateTime(date){
  const year=Math.max(date.getFullYear(),1980);
  const dosTime=(date.getHours()<<11)|(date.getMinutes()<<5)|(date.getSeconds()>>1);
  const dosDate=((year-1980)<<9)|((date.getMonth()+1)<<5)|date.getDate();
  return {dosTime,dosDate};
}
function writeUint16(bytes,value){bytes.push(value&255,(value>>>8)&255);}
function writeUint32(bytes,value){bytes.push(value&255,(value>>>8)&255,(value>>>16)&255,(value>>>24)&255);}
function asciiBytes(text){
  const bytes=[];
  for(let i=0;i<text.length;i++)bytes.push(text.charCodeAt(i)&255);
  return bytes;
}
const CRC_TABLE=(()=>{
  const table=new Uint32Array(256);
  for(let n=0;n<256;n++){
    let c=n;
    for(let k=0;k<8;k++)c=(c&1)?(0xedb88320^(c>>>1)):(c>>>1);
    table[n]=c>>>0;
  }
  return table;
})();
function crc32(buffer){
  const data=new Uint8Array(buffer);
  let crc=0xffffffff;
  for(let i=0;i<data.length;i++)crc=CRC_TABLE[(crc^data[i])&255]^(crc>>>8);
  return (crc^0xffffffff)>>>0;
}
async function createZipBlob(files){
  const now=dosDateTime(new Date());
  const chunks=[];
  const central=[];
  let offset=0;
  for(const file of files){
    const safeName=file.name.replace(/[^A-Za-z0-9._-]/g,'_');
    const nameBytes=asciiBytes(safeName);
    const buffer=await file.blob.arrayBuffer();
    const size=buffer.byteLength;
    const crc=crc32(buffer);

    const local=[];
    writeUint32(local,0x04034b50); // Local file header signature
    writeUint16(local,20);         // ZIP 2.0
    writeUint16(local,0);          // ASCII filename, no encryption, no data descriptor
    writeUint16(local,0);          // Store，不壓縮；Windows/iOS 支援最穩
    writeUint16(local,now.dosTime);
    writeUint16(local,now.dosDate);
    writeUint32(local,crc);
    writeUint32(local,size);
    writeUint32(local,size);
    writeUint16(local,nameBytes.length);
    writeUint16(local,0);
    chunks.push(new Uint8Array(local),new Uint8Array(nameBytes),buffer);

    const centralHeader=[];
    writeUint32(centralHeader,0x02014b50); // Central directory signature
    writeUint16(centralHeader,20);         // version made by
    writeUint16(centralHeader,20);         // version needed
    writeUint16(centralHeader,0);
    writeUint16(centralHeader,0);
    writeUint16(centralHeader,now.dosTime);
    writeUint16(centralHeader,now.dosDate);
    writeUint32(centralHeader,crc);
    writeUint32(centralHeader,size);
    writeUint32(centralHeader,size);
    writeUint16(centralHeader,nameBytes.length);
    writeUint16(centralHeader,0);
    writeUint16(centralHeader,0);
    writeUint16(centralHeader,0);
    writeUint16(centralHeader,0);
    writeUint32(centralHeader,0);
    writeUint32(centralHeader,offset);
    central.push(new Uint8Array(centralHeader),new Uint8Array(nameBytes));
    offset+=local.length+nameBytes.length+size;
  }
  const centralSize=central.reduce((sum,part)=>sum+part.byteLength,0);
  const end=[];
  writeUint32(end,0x06054b50); // End of central directory
  writeUint16(end,0);
  writeUint16(end,0);
  writeUint16(end,files.length);
  writeUint16(end,files.length);
  writeUint32(end,centralSize);
  writeUint32(end,offset);
  writeUint16(end,0);
  return new Blob([...chunks,...central,new Uint8Array(end)],{type:'application/zip'});
}

function downloadCanvas(canvas,filename){const link=document.createElement('a');link.download=filename;link.href=canvas.toDataURL('image/jpeg',0.92);document.body.appendChild(link);link.click();link.remove();}

function initZoomModal(){
  const modal=$('zoomModal');
  const closeBtn=$('zoomCloseBtn');
  const range=$('zoomRange');
  const viewport=$('zoomViewport');
  if(!modal||!closeBtn||!range||!viewport)return;
  closeBtn.addEventListener('click',closeZoomModal);
  modal.addEventListener('click',event=>{if(event.target===modal)closeZoomModal();});
  range.addEventListener('input',updateZoomScale);
  viewport.addEventListener('pointerdown',startZoomDrag);
  viewport.addEventListener('pointermove',moveZoomDrag);
  viewport.addEventListener('pointerup',endZoomDrag);
  viewport.addEventListener('pointercancel',endZoomDrag);
  viewport.addEventListener('pointerleave',endZoomDrag);
  window.addEventListener('resize',()=>{if(activeZoomCanvas)centerZoomCanvas();});
  document.addEventListener('keydown',event=>{if(event.key==='Escape'&&modal.classList.contains('isOpen'))closeZoomModal();});
}
function openZoomModal(sourceCanvas,pageIndex){
  if(!sourceCanvas)return;
  activeZoomCanvas=sourceCanvas;
  syncZoomCanvas(sourceCanvas);
  const title=$('zoomTitle');
  if(title)title.textContent='第 '+(pageIndex+1)+' 張放大預覽';
  const modal=$('zoomModal');
  modal.classList.add('isOpen');
  modal.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  setZoomPercent(70);
  centerZoomCanvas();
  setTimeout(()=>{$('zoomCloseBtn').focus();},0);
}
function closeZoomModal(){
  const modal=$('zoomModal');
  if(!modal)return;
  modal.classList.remove('isOpen');
  modal.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
  activeZoomCanvas=null;
  endZoomDrag();
}
function syncZoomCanvas(sourceCanvas){
  const zoomCanvas=$('zoomCanvas');
  if(!zoomCanvas||!sourceCanvas)return;
  zoomCanvas.width=sourceCanvas.width;
  zoomCanvas.height=sourceCanvas.height;
  const ctx=zoomCanvas.getContext('2d');
  ctx.clearRect(0,0,zoomCanvas.width,zoomCanvas.height);
  // 直接複製已渲染好的 canvas，確保放大預覽與下載 JPG 完全同一張圖。
  ctx.drawImage(sourceCanvas,0,0);
}
function setZoomPercent(percent){
  const range=$('zoomRange');
  if(range)range.value=String(percent);
  updateZoomScale();
}
function updateZoomScale(){
  const range=$('zoomRange');
  const zoomCanvas=$('zoomCanvas');
  const value=$('zoomValue');
  if(!range||!zoomCanvas)return;
  const percent=clamp(Number(range.value),30,220);
  const previousScale=zoomState.scale||1;
  zoomState.scale=percent/100;
  // 縮放時維持目前視窗中心附近的觀看位置，避免每次縮放都跳回左上角。
  if(previousScale!==zoomState.scale){
    const viewport=$('zoomViewport');
    if(viewport){
      const rect=viewport.getBoundingClientRect();
      const centerX=rect.width/2;
      const centerY=rect.height/2;
      zoomState.x=centerX-(centerX-zoomState.x)*(zoomState.scale/previousScale);
      zoomState.y=centerY-(centerY-zoomState.y)*(zoomState.scale/previousScale);
    }
  }
  applyZoomTransform();
  if(value)value.textContent=Math.round(percent)+'%';
}
function centerZoomCanvas(){
  const viewport=$('zoomViewport');
  const zoomCanvas=$('zoomCanvas');
  if(!viewport||!zoomCanvas)return;
  const rect=viewport.getBoundingClientRect();
  zoomState.x=(rect.width-zoomCanvas.width*zoomState.scale)/2;
  zoomState.y=(rect.height-zoomCanvas.height*zoomState.scale)/2;
  applyZoomTransform();
}
function applyZoomTransform(){
  const zoomCanvas=$('zoomCanvas');
  if(!zoomCanvas)return;
  zoomCanvas.style.transform='translate3d('+zoomState.x+'px,'+zoomState.y+'px,0) scale('+zoomState.scale+')';
  zoomCanvas.style.transformOrigin='0 0';
}
function startZoomDrag(event){
  if(!activeZoomCanvas)return;
  const viewport=$('zoomViewport');
  zoomState.isDragging=true;
  zoomState.startX=event.clientX;
  zoomState.startY=event.clientY;
  zoomState.originX=zoomState.x;
  zoomState.originY=zoomState.y;
  if(viewport){
    viewport.classList.add('isDragging');
    viewport.setPointerCapture(event.pointerId);
  }
}
function moveZoomDrag(event){
  if(!zoomState.isDragging)return;
  zoomState.x=zoomState.originX+(event.clientX-zoomState.startX);
  zoomState.y=zoomState.originY+(event.clientY-zoomState.startY);
  applyZoomTransform();
}
function endZoomDrag(event){
  const viewport=$('zoomViewport');
  zoomState.isDragging=false;
  if(viewport){
    viewport.classList.remove('isDragging');
    if(event&&typeof event.pointerId==='number'&&viewport.hasPointerCapture(event.pointerId))viewport.releasePointerCapture(event.pointerId);
  }
}

function initBackgroundControls(){
  const sv=$('colorSV');
  const hue=$('hueSlider');
  const alpha=$('alphaSlider');
  const hex=$('backgroundHex');
  const r=$('colorR');
  const g=$('colorG');
  const b=$('colorB');
  const a=$('colorA');
  if(!sv||!hue||!alpha||!hex||!r||!g||!b||!a)return;

  const updateFromSV=(clientX,clientY)=>{
    const rect=sv.getBoundingClientRect();
    colorState.s=clamp((clientX-rect.left)/rect.width*100,0,100);
    colorState.v=clamp(100-(clientY-rect.top)/rect.height*100,0,100);
    Object.assign(colorState,hsvToRgb(colorState.h,colorState.s,colorState.v));
    syncColorUI();
    redrawAllPages();
  };
  const startDrag=(event)=>{
    event.preventDefault();
    const point=getPoint(event);
    updateFromSV(point.x,point.y);
    const move=(e)=>{const p=getPoint(e);updateFromSV(p.x,p.y);};
    const up=()=>{window.removeEventListener('pointermove',move);window.removeEventListener('pointerup',up);};
    window.addEventListener('pointermove',move);
    window.addEventListener('pointerup',up);
  };
  sv.addEventListener('pointerdown',startDrag);
  hue.addEventListener('input',()=>{colorState.h=Number(hue.value);Object.assign(colorState,hsvToRgb(colorState.h,colorState.s,colorState.v));syncColorUI();redrawAllPages();});
  alpha.addEventListener('input',()=>{colorState.a=clamp(Number(alpha.value),0,100);syncColorUI();redrawAllPages();});
  hex.addEventListener('change',()=>{const value=hex.value.trim();if(/^#[0-9A-Fa-f]{6}$/.test(value)){setBackgroundColor(value);}else{syncColorUI();}});
  [r,g,b].forEach(input=>input.addEventListener('change',()=>{
    const nr=clamp(Number(r.value),0,255),ng=clamp(Number(g.value),0,255),nb=clamp(Number(b.value),0,255);
    const hsv=rgbToHsv(nr,ng,nb);
    Object.assign(colorState,{r:nr,g:ng,b:nb},hsv);
    syncColorUI();redrawAllPages();
  }));
  a.addEventListener('change',()=>{colorState.a=clamp(Number(a.value),0,100);syncColorUI();redrawAllPages();});
  document.querySelectorAll('.swatch').forEach(btn=>btn.addEventListener('click',()=>setBackgroundColor(btn.dataset.color||'#F4D546')));
  syncColorUI();
}
function getPoint(event){return {x:event.clientX,y:event.clientY};}
function syncColorUI(){
  const hex=rgbToHex(colorState.r,colorState.g,colorState.b).toUpperCase();
  const hueColor=`hsl(${colorState.h} 100% 50%)`;
  const final=`rgba(${colorState.r},${colorState.g},${colorState.b},${colorState.a/100})`;
  if($('backgroundColor'))$('backgroundColor').value=hex;
  if($('backgroundHex'))$('backgroundHex').value=hex;
  if($('colorR'))$('colorR').value=Math.round(colorState.r);
  if($('colorG'))$('colorG').value=Math.round(colorState.g);
  if($('colorB'))$('colorB').value=Math.round(colorState.b);
  if($('colorA'))$('colorA').value=Math.round(colorState.a);
  if($('hueSlider'))$('hueSlider').value=Math.round(colorState.h);
  if($('alphaSlider'))$('alphaSlider').value=Math.round(colorState.a);
  if($('colorSV'))$('colorSV').style.background=hueColor;
  if($('colorHandle')){ $('colorHandle').style.left=colorState.s+'%'; $('colorHandle').style.top=(100-colorState.v)+'%'; }
  if($('colorPreview'))$('colorPreview').style.background=final;
  const alphaWrap=document.querySelector('.alphaWrap');
  if(alphaWrap)alphaWrap.style.setProperty('--alphaColor',`rgb(${colorState.r},${colorState.g},${colorState.b})`);
  const alphaStyle=document.querySelector('.alphaWrap');
  if(alphaStyle)alphaStyle.style.setProperty('backgroundColor','transparent');
  const aw=document.querySelector('.alphaWrap');
  if(aw)aw.style.setProperty('--dummy','0');
}
function hexToRgb(hex){const clean=hex.replace('#','');return {r:parseInt(clean.slice(0,2),16),g:parseInt(clean.slice(2,4),16),b:parseInt(clean.slice(4,6),16)};}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(v=>Math.round(clamp(v,0,255)).toString(16).padStart(2,'0')).join('');}
function hsvToRgb(h,s,v){s/=100;v/=100;const c=v*s;const x=c*(1-Math.abs((h/60)%2-1));const m=v-c;let r=0,g=0,b=0;if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}return {r:(r+m)*255,g:(g+m)*255,b:(b+m)*255};}
function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h=0;if(d!==0){if(max===r)h=60*(((g-b)/d)%6);else if(max===g)h=60*((b-r)/d+2);else h=60*((r-g)/d+4);}if(h<0)h+=360;const s=max===0?0:d/max;return {h,s:s*100,v:max*100};}
function clamp(value,min,max){value=Number.isFinite(value)?value:min;return Math.min(max,Math.max(min,value));}

function clearAll(){currentPages=[];renderedCanvases=[];processingKey='';$('previewGrid').innerHTML='<div class="empty">上傳資料後會在這產生預覽</div>';$('downloadAllBtn').disabled=true;updateTempDownloadState();$('fileInput').value='';setUploadFileName('fileName',null);if($('tempFileInput'))$('tempFileInput').value='';setUploadFileName('tempFileName',null);setStatus('已清除本機暫存。');}
function pad(n,len){return String(n).padStart(len,'0');}
init().catch(err=>setStatus('初始化失敗：'+err.message));
})();
